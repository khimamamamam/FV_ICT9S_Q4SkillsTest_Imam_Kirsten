<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow-x: hidden;
            color: #a95271;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            animation: slide 12s ease-in-out infinite;
            filter: blur(6px) brightness(1);
            transform: scale(1.1) rotate(-2deg);
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 78, 146, 0.201);
            z-index: -1;
        }
        
        @keyframes slide {
            0% {
                background-image: url("https://i.pinimg.com/736x/d3/a6/c8/d3a6c85a881cea9eb4a50fbf5abf2334.jpg");
            }
            40% {
                background-image: url("https://i.pinimg.com/1200x/cc/03/b0/cc03b086fa3d4d8df1eed0d04ba14c6f.jpg");
            }
            80% {
                background-image: url("https://i.pinimg.com/control1/736x/68/e3/b5/68e3b58986dbd8d722b6cf13c3a722c1.jpg");
            }
            100% {
                background-image: url("https://i.pinimg.com/1200x/c7/b8/5f/c7b85f98ec7c5654ac374e253d8a7021.jpg");
            }
        }


        .main-box {
            background: rgba(255, 216, 232, 0.638);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 45px 35px;
            width: 360px;
            margin: auto;
            margin-top: 70px;
            border: 1px solid rgba(255, 120, 165, 0.4);

            animation: glowPulse 3s ease-in-out infinite;
        }


        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 20px rgba(255, 0, 81, 0.3),
                            0 0 40px rgba(255, 0, 128, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 120, 167, 0.7),
                            0 0 80px rgba(255, 0, 136, 0.5);
            }
            100% {
                box-shadow: 0 0 20px rgba(255, 0, 72, 0.3),
                            0 0 40px rgba(255, 0, 85, 0.2);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            letter-spacing: 3px;
            color: #9b536b;
            text-shadow: 0 0 12px rgba(241, 112, 188, 0.8);
        }

        h1::after {
            content: "";
            display: block;
            width: 70px;
            height: 2px;
            background: linear-gradient(to right, #ff8bcb, #ffc4e7);
            margin: 12px auto 0;
        }

        .form-control {
            border-radius: 30px;
            background: rgba(255, 120, 185, 0.2);
            border: 1px solid rgba(255, 120, 188, 0.3);
            color: #ffdced;
            padding: 10px 15px;
        }

        .form-control:focus {
            background: rgba(255, 120, 190, 0.2) !important;
            color: #ffdce6 !important;
            border: 1px solid rgba(255, 120, 197, 0.5);
            box-shadow: 0 0 8px rgba(255, 0, 106, 0.5);
        }

        .form-control::placeholder {
            color: #b9849b;
        }

        .form-control:hover {
            box-shadow: 0 0 10px rgba(255, 120, 192, 0.5);
            transition: 0.3s;
        }
        #loginBTN {
            background-color: #ffaac0;
            border: none;
            color: #5a0027;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        #loginBTN:hover {
            background-color: #ffc4da;
            transition: all 0.3 ease;
            color: #5a0024;
            box-shadow: 0 0 15px rgba(255, 0, 115, 0.8),
                        0 0 30px rgba(255, 120, 170, 0.6);
        }

        kbd {
            background: #ff008875;
            color: #5a0014;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 15px;
            box-shadow: 0 0 6px rgba(255, 0, 93, 0.694);
        }

        #instructions {
            background: rgba(255, 223, 120, 0.15);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid rgba(255, 223, 120, 0.4);
            color: #fff8dc;
        }

        .btn-light {
            background-color: #ffd700;
            border: none;
            color: #5a4500;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            background-color: #fff3c4;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.7);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 120, 185, 0.4);
            border-radius: 34px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: 0.4s;
            box-shadow: 0 0 8px rgba(255, 120, 185, 0.4);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.4s;
            box-shadow: 0 0 6px rgba(255, 0, 100, 0.5);
        }

        input:checked + .slider {
            background: linear-gradient(135deg, #ff7eb3, #ff4da6);
            box-shadow: 0 0 12px rgba(255, 0, 128, 0.8);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

</style>

</head>
<body>
    <div class="main-box text-center">
    <form>
        <h1>Login</h1>

        <details class="mb-3" ontoggle="showInstructions()">
            <summary class="btn btn-light btn-sm">Show Instructions</summary>
            <p id="instructions" style="margin-top:10px;"></p>
        </details>
        
        <label for="uname">Username</label><br>
        <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
        <br>

        <label for="pwd">Password</label><br>
        <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
        <br>

        <p id="display" class="text-danger"></p>
        
        <div class="d-flex align-items-center justify-content-center mb-3">
            <label class="switch me-2">
                <input type="checkbox" id="stayLogged">
                <span class="slider"></span>
            </label>
            <span>Stay logged in</span>
        </div>
        <br>
        <p id="stayText" style="display:none; font-size:13px; color:#ffdce6;">
            Your session will stay active on this device.
        </p>

        <input type="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
    </form>
    </div>

    <script>
        function showInstructions() {
        document.getElementById("instructions").innerHTML = 
                "Choose a username and enter the correct password. Password: RoyalcoreLover123";
        }

        let attempt_counter = 0;
        
        function authenticate() {
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;

            if (username === "hearty_pink" && pwd === "heartspinks") {
                alert("Welcome " + username + "!");
                attempt_counter = 0;
                document.getElementById("display").innerHTML = "";
                window.location.href = "index.html";
            } 
            else {
                attempt_counter++;

                if (attempt_counter >= 3) {
                    document.getElementById("display").innerHTML =
                        "Access denied. Account locked after 3 attempts!";
                    document.getElementById("loginBTN").disabled = true;
                } 
                else {
                    document.getElementById("display").innerHTML =
                        "<kbd>Incorrect username/password. Attempt " + attempt_counter + " of 3</kbd>";
                }
            }
        }
    </script>
</body>
</html>
