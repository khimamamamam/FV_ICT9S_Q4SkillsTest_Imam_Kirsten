<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">


</head>
<body>
        <div class="main-box text-center">
    <form>
        <h1>Login</h1>
        <br>

        <label for="uname">Username</label><br>
        <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
        <br>

        <label for="pwd">Password</label><br>
        <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
        <br>

        <p id="display" class="text-danger"></p>
        
        <input type="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
    </form>
    </div>

    <script>
        let attempt_counter = 0;

        function authenticate() {
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;

            if (username === "hearty_pink" && pwd === "heartspinks") {
                alert("Welcome " + username + "!");
                attempt_counter = 0;
                document.getElementById("display").innerHTML = "";
                window.location.href = "index.html";
            } 
            else {
                attempt_counter++;

                if (attempt_counter >= 3) {
                    document.getElementById("display").innerHTML =
                        "Access denied. Account locked after 3 attempts!";
                    document.getElementById("loginBTN").disabled = true;
                } 
                else {
                    document.getElementById("display").innerHTML =
                        "<kbd>Incorrect username/password. Attempt " + attempt_counter + " of 3</kbd";
                }
            }
        }
    </script>
</body>
</html>
