<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow-x: hidden;
            color: #5272a9;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            animation: slide 12s ease-in-out infinite;
            filter: blur(6px) brightness(1);
            transform: scale(1.1) rotate(-2deg);
        }
        
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(171, 209, 255, 0.201);
            z-index: -1;
        }
        
        @keyframes slide {
            0% {
                background-image: url("https://i.pinimg.com/1200x/c3/d0/aa/c3d0aaf1aa61579bd4040b67fb45fcec.jpg");
            }
            40% {
                background-image: url("https://i.pinimg.com/736x/1a/a7/d1/1aa7d1edbf11ccf0d56af1b83fec0aaf.jpg");
            }
            80% {
                background-image: url("https://i.pinimg.com/1200x/a9/65/d8/a965d8d8d577571708840e32ee29d01c.jpg");
            }
            100% {
                background-image: url("https://i.pinimg.com/736x/4c/36/e3/4c36e380a4489ae0204b5c5699bc2019.jpg");
            }
        }


        .main-box {
            background: rgba(254, 255, 255, 0.216);
            backdrop-filter: blur(15px);

            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);

            padding: 40px;
            width: 400px;
            margin: auto;
            margin-top: 100px;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 215, 120, 0.4);

            animation: glowPulse 3s ease-in-out infinite;
        }


        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 20px rgba(0, 140, 255, 0.3),
                            0 0 40px rgba(0, 106, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(120, 176, 255, 0.7),
                            0 0 80px rgba(0, 140, 255, 0.5);
            }
            100% {
                box-shadow: 0 0 20px rgba(0, 110, 255, 0.3),
                            0 0 40px rgba(0, 94, 255, 0.2);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            letter-spacing: 3px;
            color: #536c9b;
            text-shadow: 0 0 12px rgba(112, 172, 241, 0.8);
        }

        h1::after {
            content: "";
            display: block;
            width: 70px;
            height: 2px;
            background: linear-gradient(to right, #ffe88b, #c4d8ff);
            margin: 12px auto 0;
        }

        .form-control {
            border-radius: 30px;
            background: rgba(120, 167, 255, 0.2);
            border: 1px solid rgba(120, 192, 255, 0.3);
            color: #77551a;
            padding: 10px 15px;
        }

        .form-control:focus {
            background: rgba(255, 197, 120, 0.2) !important;
            color: #77551a !important;
            border: 1px solid rgba(255, 203, 120, 0.5);
            box-shadow: 0 0 8px rgba(255, 213, 0, 0.5);
        }

        .form-control::placeholder {
            color: #78693a;
        }

        .form-control:hover {
            box-shadow: 0 0 10px rgba(120, 161, 255, 0.5);
            transition: 0.3s;
        }
        
        #loginBTN {
            background-color: #aac8ff;
            border: none;
            color: #000e5a;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        #loginBTN:hover {
            background-color: #fff3c4;
            transition: all 0.3 ease;
            color: #5a4a00;
            box-shadow: 0 0 15px rgba(0, 81, 255, 0.8),
                        0 0 30px rgba(120, 201, 255, 0.6);
        }

        kbd {
            background: rgba(255, 233, 120, 0.15);
            color: #5a4500;
            padding: 3px 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 223, 120, 0.4);
            font-size: 12px;
        }

        #instructions {
            background: rgba(120, 206, 255, 0.15);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid rgba(120, 194, 255, 0.4);
            color: #183371;
        }

        .btn-light {
            background-color: #97b3ff;
            border: none;
            color: #00125a;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            color: #946f2f;
            background-color: #fff3c4;
            box-shadow: 0 0 12px rgba(0, 123, 255, 0.7);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            background: rgba(120, 170, 255, 0.4);
            border-radius: 34px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: 0.4s;
            box-shadow: 0 0 8px rgba(120, 174, 255, 0.4);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.4s;
            box-shadow: 0 0 6px rgba(0, 102, 255, 0.5);
        }

        input:checked + .slider {
            background: linear-gradient(135deg, #7eb6ff, #4d94ff);
            box-shadow: 0 0 12px rgba(255, 217, 0, 0.8);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        #small-msg {
            font-size: 12px;
            color: rgba(0, 42, 90, 0.4);
            margin-top: 5px;
            font-style: italic;
        }

        .cancel-btn {
            background-color: #b0b0b0;
            color: white;
            border: none;
        }

        .cancel-btn:hover {
            background-color: #8f8f8f;
            color: white;
        }
</style>

</head>
<body>
    <div class="main-box text-center">
    <form>
        <h1>Login</h1>

        <br>
        <details class="mb-3" ontoggle="showInstructions()">
            <summary class="btn btn-light btn-sm">Show Instructions</summary>
            <p id="instructions" style="margin-top:10px;"></p>
        </details>
        
        <label for="uname">Username</label><br>
        <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
        <br>

        <label for="pwd">Password</label><br>
        <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
        <br>

        <p id="display" class="text-danger"></p>
        <br>

        <div class="d-flex align-items-center justify-content-center mb-3">
            <label class="switch me-2">
                <input type="checkbox" id="stayLogged" onchange="loginMessage()">
                <span class="slider"></span>
            </label>
            <span>Stay logged in</span>
        </div>

        <p id="small-msg" class="text-center mt-2"></p>

        <br><br>
        <input type="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
        <input type="button" id="confirmLogout" value="Cancel" class="btn rounded-5 cancel-btn" onclick="logout()">
        <br>

        <hr>
        <a href="#">Forgot Password?</a>
    </form>
    </div>

    <script>
        function showInstructions() {
        document.getElementById("instructions").innerHTML = 
                "Choose a username and enter the correct password. Password: OBMC9Sapphire";
        }

        let attempt_counter = 0;
        
        function authenticate() {
        let username = document.getElementById("uname").value;
        let pwd = document.getElementById("pwd").value;

        if (username === "" || pwd === "") {
            alert("Please enter both username and password!");
            return;
        }

        do {
            if (pwd === "OBMC9Sapphire") {
                alert("Welcome " + username + "!");
                attempt_counter = 0;
                document.getElementById("display").innerHTML = "";
                window.location.href = "notebooks.html";
                break;
            } else {
                attempt_counter++;
                document.getElementById("display").innerHTML =
                    "Incorrect username/password. Attempt " + attempt_counter + " of 3";
            }
        } while (false);

        if (attempt_counter >= 3) {
            alert("Account locked!");
            document.getElementById("loginBTN").disabled = true;
        }
    }

        function loginMessage() {
        let isOn = document.getElementById("stayLogged").checked;

        if (isOn) {
            document.getElementById("small-msg").innerHTML =
                "<kbd>Your session will stay active on this device</kbd>";
        } else {
            document.getElementById("small-msg").innerHTML = "";
        }
        }
        
        function logout() {
            let confirmLogout = confirm("Exit now?");
            
            if (confirmLogout) {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
